<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Splitwise — Gestão Financeira</title>

  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-light: #334155;
      --input-bg: #0f172a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.1);
      --accent: #3b82f6;
      --pos: #10b981;
      --neg: #ef4444;
      --chip: rgba(51, 65, 85, 0.5);
      --radius: 16px;
      --spacing: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      padding: 20px;
      text-align: center;
      background: var(--surface);
      font-weight: 900;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--line);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--spacing);
    }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing);
      margin-bottom: 30px;
      align-items: start;
    }

    @media (min-width: 900px) {
      .section-grid { grid-template-columns: 400px 1fr; }
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: var(--spacing);
      border: 1px solid var(--line);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-weight: 700;
      margin: 24px 0 12px 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hr { height: 1px; background: var(--line); margin: var(--spacing) 0; }

    input, select {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px; /* Evita zoom no iOS */
      outline: none;
      transition: var(--transition);
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover { filter: brightness(1.1); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.secondary { background: var(--surface-light); }
    button.danger { background: var(--neg); }
    button.success { background: var(--pos); }

    button.icon {
      width: 40px;
      height: 40px;
      padding: 0;
      margin-top: 0;
      border-radius: 12px;
    }

    .small { font-size: 13px; color: var(--muted); }

    .kpi-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (min-width: 600px) { .kpi-container { grid-template-columns: 1fr 1fr; } }

    .kpi-box {
      background: var(--surface-light);
      padding: 20px;
      border-radius: var(--radius);
      border-left: 4px solid var(--accent);
    }

    .kpi-label { font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .kpi-value { font-size: 1.5rem; font-weight: 800; margin-top: 4px; color: var(--text); }

    .item {
      background: var(--surface);
      padding: 16px;
      border-radius: var(--radius);
      margin-top: 12px;
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition);
    }
    @media (min-width: 600px) { .item { flex-direction: row; align-items: center; justify-content: space-between; } }

    .item .title { font-weight: 700; font-size: 16px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; background: var(--chip); color: var(--muted); }
    .pos { color: var(--pos); }
    .neg { color: var(--neg); }
    .mono { font-family: 'Courier New', Courier, monospace; letter-spacing: -0.5px; }
    
    .trend-indicator {
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius);
      background: rgba(59, 130, 246, 0.05);
      border: 1px dashed var(--accent);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    @media (min-width: 600px) { .trend-indicator { flex-direction: row; justify-content: space-between; align-items: center; } }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 1000;
      padding: 10px;
    }
    @media (min-width: 600px) { .modal-overlay { align-items: center; } }

    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: 24px 24px 12px 12px;
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--line);
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .list-actions {
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }
    @media (min-width: 600px) { .list-actions { justify-content: flex-end; } }
  </style>
</head>
<body>
  <header>SPLITWISE</header>
  <main>
    <!-- Top Summary -->
    <div class="card" style="margin-bottom: var(--spacing);">
      <div class="section-title">📊 Visão geral</div>
      <div class="kpi-container">
        <div class="kpi-box">
          <div class="kpi-label">Total Gasto</div>
          <div id="kpiTotal" class="kpi-value mono">R$ 0,00</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Meta Individual</div>
          <div id="kpiAvg" class="kpi-value mono">R$ 0,00</div>
        </div>
      </div>
      <div id="summary" class="small">Adicione moradores para começar.</div>
      
      <div id="monthlyComparison"></div>
      
      <div class="hr"></div>
      
      <div style="margin-top: 15px;">
        <div class="small" style="margin-bottom: 8px;">Adicionar Morador</div>
        <div style="display: flex; gap: 8px;">
          <input id="name" placeholder="Novo morador..." style="margin-top:0" />
          <button onclick="addOrSaveResident()" class="success" style="margin-top:0; width: 60px;">+</button>
        </div>
      </div>
    </div>

    <!-- Expenses Section -->
    <div class="section-title">🧾 Gestão de Despesas</div>
    <div class="section-grid">
      <div class="card">
        <div class="small">Cadastrar novo gasto</div>
        <input id="desc" placeholder="Descrição" />
        <input id="value" type="number" step="0.01" placeholder="Valor (R$)" />
        <select id="paidBy" aria-label="Quem pagou?"></select>
        <button id="btnSaveExpense" onclick="addOrSaveExpense()">Salvar Lançamento</button>
      </div>
      <div id="expenses"></div>
    </div>

    <!-- Settlements Section -->
    <div class="section-title">🤝 Gestão de Acertos</div>
    <div class="section-grid">
      <div class="card">
        <div class="small">Registrar transferência</div>
        <select id="from" aria-label="Quem paga?"></select>
        <select id="to" aria-label="Quem recebe?"></select>
        <input id="amount" type="number" step="0.01" placeholder="Valor do acerto" />
        <button id="btnSaveSettlement" class="success" onclick="addOrSaveSettlement()">Confirmar Envio</button>
      </div>
      <div id="settlements"></div>
    </div>
  </main>

  <!-- Modal de Edição -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-content">
      <div class="section-title" id="modalTitle">Editar Registro</div>
      <div id="modalBody">
        <!-- Preenchido dinamicamente via JS -->
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button onclick="closeModal()" class="secondary">Cancelar</button>
        <button id="modalConfirmBtn">Salvar Alterações</button>
      </div>
    </div>
  </div>

<script>
  let state = JSON.parse(localStorage.getItem('splitwise_state')) || {
    residents: [],
    expenses: [],
    settlements: [],
    history: []
  };

  let editing = { residentIndex: null, expenseIndex: null, settlementIndex: null };

  // ---------------- HELPERS ----------------
  function money(n){
    const v = Number(n || 0);
    return `R$ ${v.toFixed(2).replace('.', ',')}`;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'<','>':'>','"':'"',"'":'&#039;'}[s]));
  }

  function save(){
    localStorage.setItem('splitwise_state', JSON.stringify(state));
    render();
  }

  // ---------------- MODAL LOGIC ----------------
  function openModal(title, bodyHtml, onConfirm) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('editModal').style.display = 'flex';
    document.getElementById('modalConfirmBtn').onclick = () => {
      onConfirm();
      closeModal();
    };
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
    editing = { residentIndex: null, expenseIndex: null, settlementIndex: null };
  }

  // ---------------- RESIDENTS ----------------
  function addOrSaveResident(){
    let name = "";
    if (editing.residentIndex !== null) {
      name = document.getElementById('modal_res_name').value.trim();
    } else {
      name = document.getElementById('name').value.trim();
    }
    
    processResident(name);
  }

  function processResident(name) {
    if(!name) return;

    if(editing.residentIndex === null){
      if(state.residents.some(r => r.name === name)) return;
      state.residents.push({ name });
    } else {
      state.residents[editing.residentIndex] = { name };
      editing.residentIndex = null;
    }
    
    state.residents.sort((a, b) => a.name.localeCompare(b.name));
    document.getElementById('name').value = '';
    save();
  }

  function startEditResident(index) {
    editing.residentIndex = index;
    const r = state.residents[index];
    const html = `
      <div class="small">Nome do morador</div>
      <input id="modal_res_name" value="${escapeHtml(r.name)}" />
    `;
    openModal("Editar Morador", html, () => {
      const newName = document.getElementById('modal_res_name').value.trim();
      processResident(newName);
    });
  }

  function removeResident(index){
    const r = state.residents[index];
    if(!confirm(`Remover morador "${r.name}"? Isso também remove despesas e acertos relacionados.`)) return;

    const name = r.name;
    state.residents.splice(index, 1);
    state.expenses = state.expenses.filter(e => e.paidBy !== name);
    state.settlements = state.settlements.filter(s => s.from !== name && s.to !== name);

    if(editing.residentIndex === index){
      editing.residentIndex = null;
      document.getElementById('name').value = '';
    }

    save();
  }

  function archiveMonth() {
    const c = calculate();
    if (c.total === 0) {
      alert("Não há gastos para arquivar neste mês.");
      return;
    }

    if (!confirm("Isso irá limpar todas as despesas e acertos atuais para iniciar um novo mês. O total será salvo no histórico. Continuar?")) return;

    const monthLabel = new Date().toLocaleDateString('pt-br', { month: 'long', year: 'numeric' });
    
    state.history.push({
      date: monthLabel,
      total: c.total,
      residentsCount: state.residents.length
    });

    // Limpa transações mas mantém moradores
    state.expenses = [];
    state.settlements = [];
    
    save();
  }

  // ---------------- EXPENSES ----------------
  function updateExpenseSelectOptions(){
    const residents = state.residents;
    const opt = residents.map(r => `<option value="${escapeHtml(r.name)}">${escapeHtml(r.name)}</option>`).join('');
    document.getElementById('paidBy').innerHTML = opt;
    document.getElementById('from').innerHTML = opt;
    document.getElementById('to').innerHTML = opt;
  }

  function addOrSaveExpense(){
    const d = document.getElementById('desc');
    const v = document.getElementById('value');
    const p = document.getElementById('paidBy');

    const desc = d.value.trim();
    const value = +v.value;
    const paidBy = p.value;

    if(!desc || !pied(paidBy) || !Number.isFinite(value) || value <= 0) return;

    if(editing.expenseIndex === null){
      state.expenses.push({ desc, value, paidBy });
    } else {
      state.expenses[editing.expenseIndex] = { desc, value, paidBy };
      editing.expenseIndex = null;
    }
    d.value = ''; v.value = '';
    save();
  }

  function pied(x){
    return !!x && String(x).trim() !== '';
  }

  function startEditExpense(index){
    editing.expenseIndex = index;
    const e = state.expenses[index];
    const residents = state.residents;
    const opt = residents.map(r => `<option value="${escapeHtml(r.name)}" ${r.name === e.paidBy ? 'selected' : ''}>${escapeHtml(r.name)}</option>`).join('');
    
    const html = `
      <div class="small">Descrição</div><input id="modal_exp_desc" value="${escapeHtml(e.desc)}" />
      <div class="small">Valor</div><input id="modal_exp_val" type="number" step="0.01" value="${e.value}" />
      <div class="small">Pago por</div><select id="modal_exp_who">${opt}</select>
    `;
    openModal("Editar Despesa", html, () => {
      processExpense(
        document.getElementById('modal_exp_desc').value.trim(),
        +document.getElementById('modal_exp_val').value,
        document.getElementById('modal_exp_who').value
      );
    });
  }

  function removeExpense(index){
    if(!confirm('Remover despesa?')) return;
    state.expenses.splice(index, 1);
    if(editing.expenseIndex === index) editing.expenseIndex = null;
    save();
  }

  // ---------------- SETTLEMENTS ----------------
  function addOrSaveSettlement(){
    let from, to, value;

    if (editing.settlementIndex !== null) {
      from = document.getElementById('modal_set_from').value;
      to = document.getElementById('modal_set_to').value;
      value = +document.getElementById('modal_set_val').value;
    } else {
      from = document.getElementById('from').value;
      to = document.getElementById('to').value;
      value = +document.getElementById('amount').value;
    }

    processSettlement(from, to, value);
  }

  function processSettlement(from, to, value) {
    if(!pied(from) || !pied(to) || !Number.isFinite(value) || value <= 0 || from === to) {
      if(from === to) alert("Um morador não pode pagar para si mesmo.");
      return;
    }
    if(editing.settlementIndex === null){
      state.settlements.push({ from, to, value });
    } else {
      state.settlements[editing.settlementIndex] = { from, to, value };
      editing.settlementIndex = null;
    }
    document.getElementById('amount').value = '';
    save();
  }


  function startEditSettlement(index){
    editing.settlementIndex = index;
    const s = state.settlements[index];
    const optFrom = state.residents.map(r => `<option value="${escapeHtml(r.name)}" ${r.name === s.from ? 'selected' : ''}>${escapeHtml(r.name)}</option>`).join('');
    const optTo = state.residents.map(r => `<option value="${escapeHtml(r.name)}" ${r.name === s.to ? 'selected' : ''}>${escapeHtml(r.name)}</option>`).join('');
    
    const html = `
      <div class="small">Quem paga</div><select id="modal_set_from">${optFrom}</select>
      <div class="small">Quem recebe</div><select id="modal_set_to">${optTo}</select>
      <input id="modal_set_val" type="number" value="${s.value}" placeholder="Valor" />
    `;
    openModal("Editar Acerto", html, addOrSaveSettlement);
  }

  function removeSettlement(index){
    if(!confirm('Remover acerto?')) return;
    state.settlements.splice(index, 1);
    if(editing.settlementIndex === index) editing.settlementIndex = null;
    save();
  }

  // ---------------- CALC ----------------
  function calculate(){
    let paid = {};
    let total = 0;

    state.residents.forEach(r => paid[r.name] = 0);

    state.expenses.forEach(e => {
      paid[e.paidBy] += e.value;
      total += e.value;
    });

    const avg = total / (state.residents.length || 1);

    // ajuste de acertos (REGRA CORRIGIDA)
    let adjust = {};
    state.residents.forEach(r => adjust[r.name] = 0);

    state.settlements.forEach(s => {
      adjust[s.from] -= s.value;
      adjust[s.to] += s.value;
    });

    let final = {};
    state.residents.forEach(r => {
      final[r.name] = (paid[r.name] || 0) - (adjust[r.name] || 0);
    });

    let diff = {};
    state.residents.forEach(r => {
      diff[r.name] = final[r.name] - avg;
    });

    return { total, avg, paid, final, diff };
  }

  // ---------------- RENDER ----------------
  function render(){
    updateExpenseSelectOptions();

    // Comparativo Mensal
    const comparisonDiv = document.getElementById('monthlyComparison');
    const c = calculate();
    if (state.history && state.history.length > 0) {
      const lastMonth = state.history[state.history.length - 1];
      const diff = c.total - lastMonth.total;
      const percent = lastMonth.total > 0 ? ((diff / lastMonth.total) * 100).toFixed(1) : 0;
      const isEco = diff <= 0;

      comparisonDiv.innerHTML = `
        <div class="trend-indicator">
          <div style="display: flex; flex-direction: column; gap: 4px;">
            <span>Saldo Mês Anterior (${lastMonth.date}): <b>${money(lastMonth.total)}</b></span>
            <span>Saldo Mês Atual: <b>${money(c.total)}</b></span>
          </div>
          <span class="${isEco ? 'pos' : 'neg'}" style="align-self: center;">
            ${isEco ? '↓ Economia' : '↑ Aumento'} de ${Math.abs(percent)}%
          </span>
        </div>
      `;
    } else {
      comparisonDiv.innerHTML = '';
    }

    document.getElementById('expenses').innerHTML = state.expenses
      .map((e, idx) => `
        <div class="item">
          <div class="meta" style="flex: 1">
            <div class="title">${escapeHtml(e.desc)}</div>
            <div class="badges">
              <span class="badge mono" style="color:var(--neg)">${money(e.value)}</span>
              <span class="badge">Pago por: ${escapeHtml(e.paidBy)}</span>
            </div>
          </div>
          <div class="list-actions">
            <button class="icon secondary" title="Editar" onclick="startEditExpense(${idx})">✏️</button>
            <button class="icon danger" title="Remover" onclick="removeExpense(${idx})">🗑️</button>
          </div>
        </div>
      `).join('');

    document.getElementById('settlements').innerHTML = state.settlements
      .map((s, idx) => `
        <div class="item">
          <div class="meta" style="flex-grow: 1;">
            <div class="title" style="color: var(--accent)">${escapeHtml(s.from)} <span style="color: var(--muted); font-weight: 400;">pagou para</span> ${escapeHtml(s.to)}</div>
            <div class="badges">
              <span class="badge mono" style="color:var(--pos)">${money(s.value)}</span>
              <span class="badge">Acerto</span>
            </div>
          </div>
          <div class="list-actions">
            <button class="icon secondary" title="Editar" onclick="startEditSettlement(${idx})">✏️</button>
            <button class="icon danger" title="Remover" onclick="removeSettlement(${idx})">🗑️</button>
          </div>
        </div>
      `).join('');

    document.getElementById('kpiTotal').textContent = money(c.total);
    document.getElementById('kpiAvg').textContent = money(c.avg);

    if(state.residents.length === 0){
      document.getElementById('summary').innerHTML = 'Adicione moradores para começar.';
      return;
    }

    let html = '';
    html += `<div class="small">Gasto final + diferença vs média (meta)</div>`;
    state.residents.forEach(r => {
      const v = c.final[r.name] || 0;
      const d = c.diff[r.name] || 0;
      const isPos = d >= 0;
      html += ` 
        <div class="item">
          <div style="flex: 1">
            <div class="title">${escapeHtml(r.name)}</div>
            <div class="badges">
              <span class="badge">Final: <b class="mono">${money(v)}</b></span>
              <span class="badge ${isPos ? 'pos' : 'neg'}">
                ${isPos ? 'A receber' : 'A pagar'}: ${money(Math.abs(d))}
              </span>
            </div>
          </div>
          <div class="list-actions">
            <button class="icon secondary" style="background: transparent; border: 1px solid var(--line);" title="Editar" onclick="startEditResident(${state.residents.findIndex(res => res.name === r.name)})">✏️</button>
            <button class="icon danger" style="background: transparent; border: 1px solid var(--line);" title="Remover" onclick="removeResident(${state.residents.findIndex(res => res.name === r.name)})">🗑️</button>
          </div>
        </div>
      `;
    });
    html += `<div class="hr"></div>`;
    document.getElementById('summary').innerHTML = html;
  }

  // initial
  render();
</script>
</body>
</html>
